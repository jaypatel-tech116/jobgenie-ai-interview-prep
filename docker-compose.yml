services:
  mongo:
    image: mongo:latest
    container_name: jobgenie-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: jobgenie-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/jobgenie
    env_file:
      - ./Backend/.env
    depends_on:
      - mongo

volumes:
  mongo-data:
